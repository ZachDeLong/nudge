name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version || true

      - name: Build (release)
        run: swift build -c release

      - name: Run matching test runner
        run: |
          swift build --product nudge-test-matching -c release
          .build/release/nudge-test-matching

      - name: Run XCTest suite
        run: swift test -c release

      - name: Build .app bundle
        run: |
          BUILD_DIR=.build/release
          rm -rf "$BUILD_DIR/Nudge.app"
          mkdir -p "$BUILD_DIR/Nudge.app/Contents/MacOS"
          cp "$BUILD_DIR/Nudge"            "$BUILD_DIR/Nudge.app/Contents/MacOS/Nudge"
          cp "$BUILD_DIR/nudge-hook"       "$BUILD_DIR/Nudge.app/Contents/MacOS/nudge-hook"
          cp "$BUILD_DIR/nudge-agent-hook" "$BUILD_DIR/Nudge.app/Contents/MacOS/nudge-agent-hook"
          cp "$BUILD_DIR/nudge-ask"        "$BUILD_DIR/Nudge.app/Contents/MacOS/nudge-ask"
          cp "$BUILD_DIR/nudge-claude"     "$BUILD_DIR/Nudge.app/Contents/MacOS/nudge-claude"
          cp Resources-Info.plist           "$BUILD_DIR/Nudge.app/Contents/Info.plist"

      - name: Zip app bundle
        run: |
          cd .build/release
          zip -ry Nudge.app.zip Nudge.app

      - name: Upload Nudge.app.zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nudge.app
          path: .build/release/Nudge.app.zip
          retention-days: 14

  shellcheck:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: brew install shellcheck
      - name: Lint scripts
        run: shellcheck --severity=warning scripts/*.sh install.sh
