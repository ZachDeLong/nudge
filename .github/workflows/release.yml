name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Run tests
        run: |
          swift build --product nudge-test-matching -c release
          .build/release/nudge-test-matching
          swift test -c release

      - name: Build .app bundle
        run: |
          BUILD_DIR=.build/release
          rm -rf "$BUILD_DIR/Nudge.app"
          mkdir -p "$BUILD_DIR/Nudge.app/Contents/MacOS"
          cp "$BUILD_DIR/Nudge"            "$BUILD_DIR/Nudge.app/Contents/MacOS/Nudge"
          cp "$BUILD_DIR/nudge-hook"       "$BUILD_DIR/Nudge.app/Contents/MacOS/nudge-hook"
          cp "$BUILD_DIR/nudge-agent-hook" "$BUILD_DIR/Nudge.app/Contents/MacOS/nudge-agent-hook"
          cp "$BUILD_DIR/nudge-ask"        "$BUILD_DIR/Nudge.app/Contents/MacOS/nudge-ask"
          cp "$BUILD_DIR/nudge-claude"     "$BUILD_DIR/Nudge.app/Contents/MacOS/nudge-claude"
          cp "$BUILD_DIR/nudge-update"     "$BUILD_DIR/Nudge.app/Contents/MacOS/nudge-update"
          cp Resources-Info.plist           "$BUILD_DIR/Nudge.app/Contents/Info.plist"

      - name: Verify Info.plist version matches tag
        run: |
          PLIST="Resources-Info.plist"
          PLIST_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST")
          TAG="${GITHUB_REF##*/}"
          TAG_VERSION="${TAG#v}"
          if [[ "$PLIST_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::Tag $TAG (-> $TAG_VERSION) doesn't match Info.plist version $PLIST_VERSION"
            exit 1
          fi
          echo "Version OK: $PLIST_VERSION"

      - name: Zip app bundle
        run: |
          cd .build/release
          zip -ry Nudge.app.zip Nudge.app

      - name: Create release and upload asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF##*/}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            .build/release/Nudge.app.zip || \
          gh release upload "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            .build/release/Nudge.app.zip
